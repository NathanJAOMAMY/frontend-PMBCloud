<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XSS Test</title>
</head>
<body>
    <h1>Test XSS (vulnérable)</h1>
    <div id="output"></div>
    <script>
        // Récupère le paramètre 'msg' de l'URL et l'affiche sans échappement
        const urlParams = new URLSearchParams(window.location.search);
        const msg = urlParams.get('msg') || 'pas de message';
        document.getElementById('output').innerHTML = msg;
    </script>
</body>
</html>
