name: Frontend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Validation projet structure
      run: |
        if [ ! -f ./package.json ]; then
          echo "Error: package.json not found!"
          exit 1
        fi
        if [ ! -f ./vite.config.js ]; then
          echo "Warning: vite.config.js not found"
        fi
        echo "Project structure validated."

    - name: Build application
      run: |
        npm run build
        echo "Build completed successfully."

    - name: Test Docker build
      run: |
        docker build -t pmbcloud-frontend -f Dockerfile .
        echo "Docker build successful."

        # Tester l'image rapidement
        docker run -d --name test-frontend -p 8080:8080 pmbcloud-frontend
        sleep 15
        
        # Vérifier que le conteneur fonctionne
        if docker ps | grep -q test-frontend; then
          echo "Docker container is running"
          
          # Vérifier les logs pour détecter les erreurs
          echo "Container logs:"
          docker logs test-frontend --tail 20 || true
          
          # Vérifier que le service répond
          if curl -s -o /dev/null -w "%{http_code}\n" http://localhost:8080 | grep -q "200\|301\|302"; then
            echo "✓ Container responding on port 8080"
            docker stop test-frontend
            docker rm test-frontend
          else
            echo "✗ Container not responding on port 8080"
            docker logs test-frontend || true
            docker stop test-frontend || true
            docker rm test-frontend || true
            exit 1
          fi
        else
          echo "✗ Docker container failed to start"
          docker logs test-frontend 2>/dev/null || echo "No logs available"
          exit 1
        fi

    - name: Security audit dependencies
      run: |
        # Audit npm
        npm audit --audit-level=high || echo "Audit completed with warnings"
        
        # Générer un rapport si des vulnérabilités sont trouvées
        if [ -f "package-lock.json" ]; then
          npx npm-audit-html --output audit-report.html || true
        fi

    - name: Check for exposed secrets
      run: |
        # Chercher des clés API dans le code frontend
        echo "Checking for exposed secrets..."
        
        # Liste des patterns de secrets à rechercher
        SECRET_PATTERNS="SUPABASE_KEY\|SUPABASE_ANON_KEY\|JWT_SECRET\|MONGO_URI\|API_KEY\|SECRET"
        
        # Rechercher dans les fichiers source
        if grep -r "$SECRET_PATTERNS" ./src --include="*.js" --include="*.jsx" --include="*.ts" --include="*.tsx" 2>/dev/null; then
          echo "ERROR: Secrets found in frontend source code!"
          exit 1
        fi
        
        # Rechercher dans les fichiers de configuration
        if grep -r "$SECRET_PATTERNS" . --include="*.json" --include="*.js" --exclude-dir=node_modules --exclude=package.json 2>/dev/null; then
          echo "ERROR: Secrets found in configuration files!"
          exit 1
        fi
        
        echo "No secrets exposed in frontend code ✓"
    - name: Apply CSP and Console fixes
      run: |
        chmod +x ./scripts/fix-lighthouse-issues.sh
        ./scripts/fix-lighthouse-issues.sh

    - name: Debug Login.tsx file
      run: |
        echo "Displaying Login.tsx content for debugging:"
        sed -n '1,200p' src/pages/Login.tsx

    - name: Build with production settings
      run: |
        npm run build
        # Vérifier la build
        if [ -d "dist" ]; then
          echo "Build successful, dist folder exists"
          ls -la dist/
        else
          echo "Build failed"
          exit 1
        fi

    - name: Test CSP headers locally
      run: |
        npx serve@latest -s dist -l 8080 &
        SERVER_PID=$!
        sleep 10
        curl -I http://localhost:8080 | grep -i "content-security-policy" || echo "CSP header not found"
        kill $SERVER_PID 2>/dev/null || true

    - name: Run Lighthouse CI
      uses: treosh/lighthouse-ci-action@v11
      with:
        configPath: './lighthouserc.json'
        uploadArtifacts: true
        temporaryPublicStorage: true
        runs: 1

    - name: Snyk Security Scan
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }} 