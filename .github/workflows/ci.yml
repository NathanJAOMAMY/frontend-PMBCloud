name: Frontend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'

    - name: Install dependencies
      run: npm ci
    - name: Validation projet structure
      run: |
        if [ ! -f ./package.json ]; then
          echo "Error: package.json not found!"
          exit 1
        fi
        if [ ! -f ./vite.config.js ]; then
          echo "Warning: vite.config.js not found"
        fi
        echo "Project structure validated."

    - name: Build application
      run: |
        npm run build
        echo "Build completed successfully."

    - name: Build Docker image
      run: |
        docker build -t pmbcloud-frontend:latest -f Dockerfile .
        docker tag pmbcloud-frontend:latest pmbcloud-frontend:${{ github.sha }}
        echo "Docker build successful."

    - name: Create SARIF file and run security scan (write to workspace)
      run: |
        # Ensure we write to the repository workspace explicitly
        SARIF_PATH="$GITHUB_WORKSPACE/trivy-results.sarif"

        # Create an empty SARIF scaffold at the absolute workspace path
        cat > "$SARIF_PATH" << 'SARIF'
        {
          "version": "2.1.0",
          "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
          "runs": []
        }
        SARIF

        echo "✓ SARIF scaffold created at: $SARIF_PATH"
        ls -la "$SARIF_PATH" || true

        # Try to install and run Trivy (non-fatal)
        echo "Attempting to install Trivy..."
        sudo wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key 2>/dev/null | sudo apt-key add - 2>/dev/null || true
        echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list 2>/dev/null || true
        sudo apt-get update 2>/dev/null || true
        sudo apt-get install -y trivy 2>/dev/null || echo "Trivy installation skipped"

        # Run Trivy into the absolute path if available
        if command -v trivy &> /dev/null; then
          echo "Running Trivy scan into $SARIF_PATH..."
          trivy image --format sarif --output "$SARIF_PATH" --severity CRITICAL,HIGH pmbcloud-frontend:latest 2>/dev/null || echo "Trivy scan failed; SARIF scaffold remains"
        else
          echo "Trivy not available; leaving SARIF scaffold"
        fi

        # Final verification
        echo "Final check:"
        ls -la "$SARIF_PATH"
        echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"

    - name: Debug - Check SARIF file in workspace
      if: always()
      run: |
        echo "Listing SARIF files in workspace: $GITHUB_WORKSPACE"
        ls -la "$GITHUB_WORKSPACE"/*.sarif 2>/dev/null || echo "No SARIF files found in workspace"
        echo "Show SARIF head (if exists):"
        head -n 100 "$GITHUB_WORKSPACE"/trivy-results.sarif 2>/dev/null || echo "trivy-results.sarif not readable"

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: '${{ github.workspace }}/trivy-results.sarif'
      continue-on-error: true

    - name: Generate SBOM with Syft
      uses: anchore/sbom-action@v0
      with:
        image: 'pmbcloud-frontend:latest'
        format: 'cyclonedx-json'
        output-file: 'sbom.json'

    - name: Test Docker container
      run: |
        docker run -d --name test-frontend -p 8080:8080 pmbcloud-frontend:latest
        sleep 15
        
        if docker ps | grep -q test-frontend; then
          echo "Docker container is running"
          docker logs test-frontend --tail 20 || true
          
          if curl -s -o /dev/null -w "%{http_code}\n" http://localhost:8080 | grep -q "200\|301\|302"; then
            echo "✓ Container responding on port 8080"
            docker stop test-frontend
            docker rm test-frontend
          else
            echo "✗ Container not responding on port 8080"
            docker logs test-frontend || true
            docker stop test-frontend || true
            docker rm test-frontend || true
            exit 1
          fi
        else
          echo "✗ Docker container failed to start"
          docker logs test-frontend 2>/dev/null || echo "No logs available"
          exit 1
        fi

    - name: Security audit dependencies
      run: |
        # Audit npm
        npm audit --audit-level=high || echo "Audit completed with warnings"
        
        # Générer un rapport si des vulnérabilités sont trouvées
        if [ -f "package-lock.json" ]; then
          npx npm-audit-html --output audit-report.html || true
        fi

    - name: Scan for exposed secrets with detect-secrets
      run: |
        echo "Scanning for exposed secrets..."
        pip install detect-secrets --quiet
        
        # Lancer le scan
        detect-secrets scan --all-files --baseline .secrets.baseline 2>/dev/null || true
        
        echo "✓ Secrets scanning completed (review any alerts in GitHub Security tab)"
    - name: Apply CSP and Console fixes
      run: |
        chmod +x ./scripts/fix-lighthouse-issues.sh
        ./scripts/fix-lighthouse-issues.sh

    - name: Verify production build
      run: |
        if [ -d "dist" ]; then
          echo "Build successful, dist folder exists"
          echo "Build artifacts: $(find dist -type f | wc -l) files"
        else
          echo "Build failed"
          exit 1
        fi

    - name: Test CSP headers locally
      run: |
        npx serve@latest -s dist -l 8080 &
        SERVER_PID=$!
        sleep 10
        curl -I http://localhost:8080 | grep -i "content-security-policy" || echo "CSP header not found"
        kill $SERVER_PID 2>/dev/null || true

    - name: Run Lighthouse CI
      run: |
        echo "=== 1. Build application ==="
        npm run build
        
        echo "=== 2. Create serve configuration with CSP ==="
        # Créer le fichier à la racine, PAS dans dist/
        cat > serve-config.json << 'EOF'
        {
          "headers": [
            {
              "source": "**/*",
              "headers": [
                {
                  "key": "Content-Security-Policy",
                  "value": "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' ws: wss: https:; frame-src 'self'; media-src 'self' data: blob:; worker-src 'self' blob:; manifest-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';"
                },
                {
                  "key": "X-Frame-Options",
                  "value": "DENY"
                },
                {
                  "key": "X-Content-Type-Options",
                  "value": "nosniff"
                },
                {
                  "key": "X-XSS-Protection",
                  "value": "1; mode=block"
                }
              ]
            }
          ]
        }
        EOF
        
        echo "=== 3. Start server with CSP headers ==="
        npx serve@latest -s dist -l 8080 --cors --config=serve-config.json &
        SERVER_PID=$!
        
        echo "=== 4. Wait for server to start ==="
        sleep 15
        
        echo "=== 5. Verify CSP is working ==="
        echo "Testing headers..."
        curl -I http://localhost:8080
        
        echo "=== 6. Run Lighthouse CI directly ==="
        # Install Lighthouse CI CLI (si pas déjà installé)
        npm install -g @lhci/cli 2>/dev/null || echo "Already installed"
        
        # Utiliser votre lighthouserc.json existant au lieu de créer un nouveau
        echo "Using existing lighthouserc.json configuration..."
        
        # Run Lighthouse CI
        lhci collect --config=./lighthouserc.json
        lhci assert --config=./lighthouserc.json
        lhci upload --config=./lighthouserc.json
        
        echo "=== 7. Clean up ==="
        kill $SERVER_PID 2>/dev/null || true

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: 'javascript'

    - name: Run CodeQL Analysis
      uses: github/codeql-action/analyze@v4

    - name: Run Snyk Security Scan (if token available)
      uses: snyk/actions/node@master
      if: env.SNYK_TOKEN != ''
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      continue-on-error: true

    - name: Parse SARIF and prepare notifications
      id: parse_sarif
      if: always()
      run: |
        node scripts/parse-sarif.js

    - name: Notify Slack - Security Alerts
      if: always() && env.SLACK_WEBHOOK != ''
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
      run: |
        # Extraire les métriques
        CODEQL_ISSUES=$(jq '.runs[0].results | length' results/javascript.sarif 2>/dev/null || echo "0")
        TRIVY_ISSUES=$(jq '.runs[0].results | length' trivy-results.sarif 2>/dev/null || echo "0")
        
        # Construire le message Slack
        SLACK_MSG="{
          \"text\": \"🔒 Security Scan Results - frontend-PMBCloud\",
          \"blocks\": [
            {
              \"type\": \"header\",
              \"text\": {
                \"type\": \"plain_text\",
                \"text\": \"🔒 Security Scan Report\"
              }
            },
            {
              \"type\": \"section\",
              \"fields\": [
                {
                  \"type\": \"mrkdwn\",
                  \"text\": \"*CodeQL Issues:*\n${CODEQL_ISSUES}\"
                },
                {
                  \"type\": \"mrkdwn\",
                  \"text\": \"*Trivy Issues:*\n${TRIVY_ISSUES}\"
                }
              ]
            },
            {
              \"type\": \"section\",
              \"text\": {
                \"type\": \"mrkdwn\",
                \"text\": \"📊 View full report: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|GitHub Actions>\n🔗 Commit: <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n👤 By: ${{ github.actor }}\"
              }
            }
          ]
        }"
        
        curl -X POST -H 'Content-type: application/json' \
          --data "$SLACK_MSG" \
          "$SLACK_WEBHOOK"

    - name: Comment PR with Security Results
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const codeqlIssues = JSON.parse(fs.readFileSync('results/javascript.sarif', 'utf8')).runs[0].results.length || 0;
          const trivyIssues = JSON.parse(fs.readFileSync('trivy-results.sarif', 'utf8')).runs[0].results.length || 0;
          
          const comment = `## 🔒 Security Scan Report
          
          | Tool | Issues Found |
          |------|--------------|
          | CodeQL (SAST) | ${codeqlIssues} |
          | Trivy (Container) | ${trivyIssues} |
          
          ### 📋 Recommendations
          - Review findings above before merge
          - Check [Full Report](${context.payload.pull_request.html_url}/checks)
          - Contact security team if urgent
          `;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

    - name: Upload security and build artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-and-build-artifacts
        path: |
          dist/
          sbom.json
          trivy-results.sarif
          audit-report.html
        retention-days: 30 