version: 2
updates:
  # Enable Dependabot version updates for npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"
    allow:
      - dependency-type: "all"

  # Enable Dependabot security updates (always enabled automatically)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    labels:
      - "ci"
      - "github-actions"
