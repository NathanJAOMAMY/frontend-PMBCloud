version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://pmbcloud-backend:3001
    container_name: pmbcloud-frontend
    ports:
      - "8080:8080"
    environment:
      - VITE_API_BASE_URL=http://pmbcloud-backend:3001
    networks:
      - pmbcloud-shared-network  
networks:
  pmbcloud-shared-network:
    external: true 
    name: pmbcloud-shared-network